@let onwedChars = gameStore.unlockedChars();

<section class="prizes">
  <p class="title">{{ 'characters.selectYourPrize' | transloco }}</p>

  <div class="character-container" role="radiogroup" [attr.aria-label]="'characters.selectYourPrize' | transloco">
    @for(char of chars; track $index) {
    <button
      type="button"
      class="character"
      [class.selected]="char === selectedChar()"
      [class.owned]="onwedChars?.includes(char)"
      [disabled]="onwedChars?.includes(char)"
      (click)="selectedChar.set(char)"
      role="radio"
      [attr.aria-checked]="char === selectedChar()"
      [attr.aria-label]="'charName.' + char | transloco"
    >
      <img
        [ngSrc]="$index === 0 ? `chars/${char}/bow.svg` : `chars/${char}/bow.png`"
        [alt]="char"
        draggable="false"
        width="120"
        height="180"
        priority
      />
      <div class="char-name">{{ 'charName.' + char | transloco }}</div>
    </button>
    }
  </div>

  <button type="button" [disabled]="!selectedChar()" (click)="onClick()">
    {{ 'characters.confirmCharacterButton' | transloco }}
  </button>
</section>
