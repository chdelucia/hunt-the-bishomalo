<div class="achievements-container">
  <div class="achievements-content">
    <div class="header-container">
      <a routerLink="/home" class="back-link">
        <i class="arrow-left-icon"></i>
        <span>{{ 'achievements.backToGame' | transloco }}</span>
      </a>
    </div>

    <div class="progress-section bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700 mb-8">
      <h2 class="text-2xl font-bold text-white mb-6 flex items-center">
        <span class="mr-2">🏆</span> {{ 'achievements.progressTitle' | transloco }}
      </h2>

      <lib-achievement-progress
        [unlockedCount]="unlockedCount"
        [totalCount]="achievements.length"
        [percentage]="percentage"
      />

      <lib-achievement-filter [currentFilter]="filter" (filterChanged)="setFilter($event)" />
    </div>

    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
      [@listAnimation]="filteredAchievements.length"
    >
      @for (achievement of filteredAchievements; track achievement.id) {
        <lib-achievement-item [achievement]="achievement" />
      }
    </div>

    @if (filteredAchievements.length === 0) {
      <div class="text-center py-20 bg-gray-800 rounded-xl border border-dashed border-gray-600">
        <p class="text-gray-400 text-lg italic">
          {{ 'achievements.noAchievements' | transloco }}
        </p>
      </div>
    }
  </div>
</div>
