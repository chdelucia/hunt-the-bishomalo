<div class="filter-group">
  <button
    (click)="setFilter('all')"
    class="filter-btn all nes-btn"
    [class.is-primary]="currentFilter() === 'all'"
  >
    {{ 'achievements.filterAll' | transloco }}
  </button>
  <button
    (click)="setFilter('unlocked')"
    class="filter-btn unlocked nes-btn"
    [class.is-success]="currentFilter() === 'unlocked'"
  >
    {{ 'achievements.filterUnlocked' | transloco }}
  </button>
  <button
    (click)="setFilter('locked')"
    class="filter-btn locked nes-btn"
    [class.is-warning]="currentFilter() === 'locked'"
  >
    {{ 'achievements.filterLocked' | transloco }}
  </button>
</div>
