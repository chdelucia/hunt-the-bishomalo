<div
  class="flex items-center p-3 rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors duration-200 border border-gray-600"
  [class.opacity-50]="!achievement().unlocked"
>
  <div class="relative w-16 h-16 mr-4 flex-shrink-0">
    <div
      class="w-full h-full rounded-full border-2 border-gray-500 overflow-hidden bg-gray-800"
      [class.grayscale]="!achievement().unlocked"
    >
      <img
        [ngSrc]="'achievements/' + achievement().svgIcon"
        [alt]="achievement().title"
        fill
        class="achievement-icon p-1"
        style="object-fit: contain;"
      />
    </div>
    @if (!achievement().unlocked) {
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-2xl opacity-50">🔒</span>
      </div>
    }
  </div>

  <div class="flex-grow">
    <div class="flex justify-between items-start mb-1">
      <h3 class="font-bold text-lg text-white leading-tight mr-2">
        {{ achievement().title }}
      </h3>
      <span
        class="text-[10px] uppercase font-bold px-2 py-0.5 rounded text-white whitespace-nowrap"
        [class]="rarityColor()"
      >
        {{ getRarityName(achievement().rarity) }}
      </span>
    </div>
    <p class="text-gray-300 text-sm leading-snug">
      {{ achievement().description }}
    </p>
  </div>
</div>
