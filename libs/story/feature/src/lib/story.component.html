<main class="story-page">
  <button
    type="button"
    class="story-container"
    (click)="goToGame()"
    [attr.aria-label]="'storyPage.clickToStartInstruction' | transloco"
  >
    <h1 class="chapter">{{ 'storyPage.chapterPrefix' | transloco }}{{ story?.level }}</h1>
    <h2 class="title">
      {{ story?.titleKey | transloco }}
    </h2>
    <p class="text">
      @if (reading()) {
        {{ displayedText() }}
      } @else {
        {{ story?.textKey | transloco }}
      }
    </p>

    @if(showExtraInfo()){
      @if (story?.effect) {
        <p class="effect">
          {{ 'storyPage.effectPrefix' | transloco }}{{ 'diary.effect.' + story!.effect | transloco }}
        </p>
      }

      <p class="instruction">{{ 'storyPage.clickToStartInstruction' | transloco }}</p>
    }
  </button>
</main>
