@let opened = isOpen();

<button
  class="menu-toggle"
  [class.open]="opened"
  (click)="toggleMenu()"
  [attr.aria-label]="(opened ? 'menu.closeMenuAriaLabel' : 'menu.openMenuAriaLabel') | transloco"
  [attr.aria-expanded]="opened"
  aria-controls="mobile-navigation"
>
  <div class="bar bar1" [class.open]="opened"></div>
  <div class="bar bar2" [class.open]="opened"></div>
  <div class="bar bar3" [class.open]="opened"></div>
</button>

@if (opened) {
  <div class="mobile-menu" id="mobile-navigation">
    <ul>
      <li><button>&nbsp;</button></li>
      <li>
        <button (click)="nagivateTo(ROUTES.HOME)">{{ 'menu.home' | transloco }}</button>
      </li>
      <li>
        <button (click)="nagivateTo(ROUTES.ACHIEVEMENTS)">
          {{ 'menu.achievements' | transloco }}
        </button>
      </li>
      <li>
        <button (click)="nagivateTo(ROUTES.RULES)">{{ 'menu.instructions' | transloco }}</button>
      </li>
      <li>
        <button (click)="nagivateTo(ROUTES.CREDITS)">{{ 'menu.credits' | transloco }}</button>
      </li>
      <li>
        <button (click)="newGame()" class="newgame">{{ 'menu.newGame' | transloco }}</button>
      </li>
    </ul>
  </div>
}

<div class="menu-desktop">
  <div class="left-icons">
    <a [routerLink]="['/', ROUTES.ACHIEVEMENTS]" class="achievement-link">
      <img
        class="achivements"
        src="trophy.svg"
        alt="{{ 'menu.achievementsAlt' | transloco }}"
      />
    </a>
  </div>
  <div class="right-icon">
    <ng-content></ng-content>
  </div>
</div>
