@if (!isFinish()) {
  <div class="mobile-controls">
    <button
      class="control-btn"
      (click)="turnLeft()"
      [attr.aria-label]="'mobileControls.turnLeftAriaLabel' | transloco"
    >
      <img
        [ngSrc]="ASSETS_BASE_URL + '/rotate-l.svg'"
        width="32"
        height="32"
        alt="{{ 'mobileControls.turnLeftAlt' | transloco }}"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="turnRight()"
      [attr.aria-label]="'mobileControls.turnRightAriaLabel' | transloco"
    >
      <img
        [ngSrc]="ASSETS_BASE_URL + '/rotate-r.svg'"
        width="32"
        height="32"
        alt="{{ 'mobileControls.turnRightAlt' | transloco }}"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="shootArrow()"
      [attr.aria-label]="'mobileControls.shootArrowAriaLabel' | transloco"
    >
      <img
        [ngSrc]="ASSETS_BASE_URL + '/shoot.svg'"
        width="32"
        height="32"
        alt="{{ 'mobileControls.shootArrowAlt' | transloco }}"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="moveForward()"
      [attr.aria-label]="'mobileControls.moveForwardAriaLabel' | transloco"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="32"
        height="32"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path d="M12 2l8 8h-6v8h-4v-8H4z" />
      </svg>
    </button>

    <button
      class="control-btn"
      (click)="toggleSound()"
      [attr.aria-label]="(soundEnabled() ? 'controls.muteSound' : 'controls.unmuteSound') | transloco"
    >
      <span class="sound-icon">{{ soundEnabled() ? '🔊' : '🔇' }}</span>
    </button>
  </div>
}
