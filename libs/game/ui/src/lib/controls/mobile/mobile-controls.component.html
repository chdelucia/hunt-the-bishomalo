@if (!isFinish()) {
  <div class="mobile-controls">
    <button
      class="control-btn"
      (click)="turnLeft()"
      [attr.aria-label]="'mobileControls.turnLeftAriaLabel' | transloco"
    >
      <img
        ngSrc="rotate-l.svg"
        width="32"
        height="32"
        alt=""
        aria-hidden="true"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="turnRight()"
      [attr.aria-label]="'mobileControls.turnRightAriaLabel' | transloco"
    >
      <img
        ngSrc="rotate-r.svg"
        width="32"
        height="32"
        alt=""
        aria-hidden="true"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="shootArrow()"
      [attr.aria-label]="'mobileControls.shootArrowAriaLabel' | transloco"
    >
      <img
        ngSrc="shoot.svg"
        width="32"
        height="32"
        alt=""
        aria-hidden="true"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="moveForward()"
      [attr.aria-label]="'mobileControls.moveForwardAriaLabel' | transloco"
    >
      <img
        ngSrc="go.svg"
        width="32"
        height="32"
        alt=""
        aria-hidden="true"
        priority
      />
    </button>

    <button
      class="control-btn"
      (click)="toggleSound()"
      [attr.aria-label]="(soundEnabled() ? 'controls.muteSound' : 'controls.unmuteSound') | transloco"
    >
      <span class="sound-icon" aria-hidden="true">{{ soundEnabled() ? '🔊' : '🔇' }}</span>
    </button>
  </div>
}
