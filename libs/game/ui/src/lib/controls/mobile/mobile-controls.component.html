<div
  class="mobile-controls-container"
  [class.finish]="isFinish()"
  *transloco="let t; read: 'mobileControls'"
>
  <div class="controls-grid">
    <div class="center-controls">
      <lib-control-button
        [label]="t('shootArrowAlt')"
        [ariaLabel]="t('shootArrowAriaLabel')"
        icon="shoot"
        customClass="arrow-btn"
        (clickEvent)="shootArrow()"
      ></lib-control-button>

      <lib-control-button
        [label]="t('moveForwardAriaLabel')"
        icon="go"
        customClass="move-btn"
        (clickEvent)="moveForward()"
      ></lib-control-button>

      <lib-control-button
        [label]="soundEnabled() ? t('muteSound') : t('unmuteSound')"
        icon="controller"
        (clickEvent)="toggleSound()"
      ></lib-control-button>
    </div>

    <div class="rotation-controls">
      <lib-control-button
        [label]="t('turnLeftAlt')"
        [ariaLabel]="t('turnLeftAriaLabel')"
        icon="rotate-l"
        (clickEvent)="turnLeft()"
      ></lib-control-button>

      <lib-control-button
        [label]="t('turnRightAlt')"
        [ariaLabel]="t('turnRightAriaLabel')"
        icon="rotate-r"
        (clickEvent)="turnRight()"
      ></lib-control-button>
    </div>
  </div>
</div>
