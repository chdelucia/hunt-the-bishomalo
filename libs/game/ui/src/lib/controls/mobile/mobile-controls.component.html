@if (!isFinish()) {
  <div class="mobile-controls">
    <lib-control-button
      [iconUrl]="ASSETS_BASE_URL + '/rotate-l.svg'"
      [ariaLabel]="'mobileControls.turnLeftAriaLabel' | transloco"
      (clicked)="turnLeft()"
      [priority]="true"
    />

    <lib-control-button
      [iconUrl]="ASSETS_BASE_URL + '/rotate-r.svg'"
      [ariaLabel]="'mobileControls.turnRightAriaLabel' | transloco"
      (clicked)="turnRight()"
      [priority]="true"
    />

    <lib-control-button
      [iconUrl]="ASSETS_BASE_URL + '/shoot.svg'"
      [ariaLabel]="'mobileControls.shootArrowAriaLabel' | transloco"
      (clicked)="shootArrow()"
      [priority]="true"
    />

    <lib-control-button
      [iconUrl]="ASSETS_BASE_URL + '/go.svg'"
      [ariaLabel]="'mobileControls.moveForwardAriaLabel' | transloco"
      (clicked)="moveForward()"
      [priority]="true"
    />

    <lib-control-button
      [label]="soundEnabled() ? '🔊' : '🔇'"
      [ariaLabel]="(soundEnabled() ? 'controls.muteSound' : 'controls.unmuteSound') | transloco"
      (clicked)="toggleSound()"
    />
  </div>
}
