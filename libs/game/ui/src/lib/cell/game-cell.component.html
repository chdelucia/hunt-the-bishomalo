@let content = cell().content;

<div class="cell" [class.visited]="cell().visited">
  @if (showElements() && content) {
    <lib-cell-content [content]="content" />
  } @else if (showHunter()) {
    @let hunterInstance = hunter();
    @if (hunterInstance) {
      <lib-hunter
        [direction]="hunterInstance.direction"
        [arrows]="hunterInstance.arrows"
        [selectedChar]="settings().selectedChar"
        [hasGold]="hunterInstance.hasGold"
        [size]="settings().size"
        [hasLantern]="!!hasLantern()"
        [hasShield]="!!hasShield()"
      />
    }
  }
</div>
