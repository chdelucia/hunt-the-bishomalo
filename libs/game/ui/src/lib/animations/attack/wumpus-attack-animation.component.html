@let selected = selectedChar();
<div class="overlay">
  <div class="animation step-{{ step() }}">
    <div
      class="player"
      [style.transform]="'translateY(-50%) translateX(' + getPlayerTranslateX() + ')' + (step() >= 4 ? ' rotate(15deg)' : '')"
      [style.opacity]="step() < 5 ? 1 : 0.3"
    >
      @if (selected === 'default') {
        <img [ngSrc]="'chars/' + selected + '/bow.svg'" alt="bow" width="120" height="180" priority />
      } @else {
        <img [ngSrc]="'chars/' + selected + '/bow.png'" alt="char" width="120" height="180" priority />
      }
    </div>

    <div class="wumpus" [style.transform]="'translateY(-50%) scale(' + getWumpusScale() + ')'">
      @if (selected === 'default') {
        <img [ngSrc]="'chars/' + selected + '/wumpus.svg'" alt="wumpus" width="140" height="280" priority />
      } @else {
        <img [ngSrc]="'chars/' + selected + '/wumpus.png'" alt="wumpus" width="140" height="280" priority />
      }
    </div>

    <!-- Sangre -->
    @if (step() >= 4) {
      <div class="blood" style="left: 40%; top: 30%"></div>
      <div class="blood" style="left: 60%; top: 40%"></div>
      <div class="blood" style="left: 30%; top: 60%"></div>
    }
  </div>

  <div class="message">¡EL WUMPUS TE HA DEVORADO!</div>
</div>
