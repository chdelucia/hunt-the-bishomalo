<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast">
      <img
        class="icon"
        [ngSrc]="'/achievements/' + toast.achievement.svgIcon"
        [alt]="'achievements.' + toast.achievement.id + '.title' | transloco : { default: toast.achievement.title }"
        [ngClass]="{ 'broken-image': toast.broken }"
        (error)="onImageError(toast.id)"
        width="40"
        height="40"
      />
      <div class="text">
        <strong>{{ 'achievements.' + toast.achievement.id + '.title' | transloco : { default: toast.achievement.title } }}</strong>
      </div>
    </div>
  }
</div>
