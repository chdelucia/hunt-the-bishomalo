<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast">
      <img
        class="icon"
        [ngSrc]="'achievements/' + toast.achievement.svgIcon"
        [alt]="toast.achievement.title"
        [ngClass]="{ 'broken-image': toast.broken }"
        (error)="onImageError(toast.id)"
        width="40"
        height="40"
      />
      <div class="text">
        <strong>{{ toast.achievement.title }}</strong>
      </div>
    </div>
  }
</div>
