<output class="toast-container" aria-live="polite">
  @for (toast of toasts(); track toast.id) {
    <div class="toast">
      <img
        class="icon"
        [src]="ASSETS_BASE_URL + '/achievements/' + toast.achievement.svgIcon"
        alt=""
        aria-hidden="true"
        [ngClass]="{ 'broken-image': toast.broken }"
        (error)="onImageError(toast.id)"
        width="40"
        height="40"
      />
      <div class="text">
        <strong>{{ 'achievements.' + toast.achievement.id + '.title' | transloco : { default: toast.achievement.title } }}</strong>
      </div>
    </div>
  }
</output>
