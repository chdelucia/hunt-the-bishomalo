<div class="toast-container">
  @for (toast of toasts(); track toast) {
    <div class="toast">
      <img
        class="icon"
        [ngSrc]="'achievements/' + toast.achievement.svgIcon"
        [alt]="toast.achievement.title"
        width="40"
        height="40"
        />
        <div class="text">
          <strong>{{ toast.achievement.title }}</strong>
        </div>
      </div>
    }
  </div>
