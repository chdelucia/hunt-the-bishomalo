<section class="game-message" aria-live="polite">
  @if (lives() <= 0) {
    <p>{{ 'message.gameOver' | transloco }}</p>
  } @else {
    <app-game-message-display
      [message]="message()"
      [hasMessage]="_hasMessage()"
      [bolaDrac]="_bolaDrac()"
    />
  }

  <app-game-message-actions
    [lives]="lives()"
    [shouldShowRetry]="_shouldShowRetry()"
    [shouldShowNextLevel]="_shouldShowNextLevel()"
    [showCongrats]="_showCongrats()"
    (newGame)="newGame()"
    (restartGame)="restartGame()"
    (nextLevel)="nextLevel()"
    (goToBoss)="goToBoss()"
  />
</section>
