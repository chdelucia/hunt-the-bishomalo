<div class="jedi-container" routerLink="/home">
  <div class="force-text">
    @if (step() >= 3) {
      <div class="whisper-text" [class]="'opacity-' + (step() - 2)">Contrata a Chris</div>
    }
  </div>

  <div class="animation-container" [class]="'step-' + step()">
    <!-- Jedi -->
    <div class="jedi">
      <svg
        width="400"
        height="400"
        viewBox="0 0 200 200"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <!-- Robe -->
        <path
          d="M60 180 L100 120 L140 180"
          fill="var(--color-purple-500)"
          stroke="var(--color-purple-500)"
          stroke-width="2"
          stroke-linecap="round"
        />
        <path
          d="M70 120 L100 180 L130 120"
          fill="var(--color-gray-500)"
          stroke="var(--color-gray-500)"
          stroke-width="2"
          stroke-linecap="round"
        />

        <!-- Body -->
        <rect x="85" y="70" width="30" height="50" fill="var(--color-gray-500)" />

        <!-- Head -->
        <circle cx="100" cy="60" r="20" fill="var(--color-white)" />

        <!-- Eyes -->
        <circle cx="92" cy="55" r="3" fill="var(--color-black)" />
        <circle cx="108" cy="55" r="3" fill="var(--color-black)" />

        <!-- Mouth -->
        <path
          d="M95 65 Q100 70 105 65"
          stroke="var(--color-black)"
          stroke-width="1.5"
          stroke-linecap="round"
        />

        <!-- Right hand -->
        @if (step() === 1) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(0, 120, 100)"
          />
        }
        @if (step() === 2) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(20, 120, 100)"
          />
        }
        @if (step() === 3) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(40, 120, 100)"
          />
        }
        @if (step() === 4) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(20, 120, 100)"
          />
        }
        @if (step() === 5) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(0, 120, 100)"
          />
        }
        @if (step() === 6) {
          <rect
            x="115"
            y="90"
            width="10"
            height="20"
            fill="var(--color-white)"
            rx="5"
            transform="rotate(-20, 120, 100)"
          />
        }

        <!-- Left hand -->
        <rect x="75" y="90" width="10" height="20" fill="var(--color-white)" rx="5" />

        <!-- Lightsaber -->
        <rect x="130" y="85" width="5" height="15" fill="var(--color-gray-500)" rx="2" />
        <rect
          x="132"
          y="40"
          width="1"
          height="45"
          [attr.fill]="step() % 2 === 0 ? 'var(--color-cyan-400)' : 'var(--color-blue-400)'"
          rx="0.5"
          filter="drop-shadow(0 0 5px var(--color-cyan-400))"
        />
      </svg>
    </div>

    @for (wave of forceWaves(); track wave; let i = $index) {
      <div class="force-wave"></div>
    }
  </div>

  <div #audioContainer></div>
</div>
