@let isAlive = game.isAlive(); @let hasWon = game.hasWon();
@let settings = game.settings();

<main [appVisualEffect]="game.message()" class="main-container">
  <lib-title [blackout]="settings.blackout || false" />

  @if (settings?.blackout && isAlive && !hasWon) {
    <app-blackout />
  }

  <app-game-board (closeAnimation)="handleClose()" />

  <section class="player-info">
    <app-game-level [settings]="settings"></app-game-level>
    <app-game-lives
      [lives]="game.lives()"
      [maxLives]="settings.difficulty.maxLives"
    ></app-game-lives>
  </section>

  <app-game-message
    [message]="game.message()"
    [isAlive]="isAlive"
    [hasWon]="hasWon"
    [settings]="settings"
    [lives]="game.lives()"
  />

  <app-mobile-controls [isFinish]="hasWon || !isAlive" />
</main>
