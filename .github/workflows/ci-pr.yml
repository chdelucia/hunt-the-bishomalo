name: CI for Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: '20'
  CACHE_DEPENDENCY_PATH: pnpm-lock.yaml

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.compute-base.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Compute NX base ref
        id: compute-base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE=origin/${{ github.event.pull_request.base.ref }}
            if git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE=$BASE" >> $GITHUB_ENV
            else
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          # export via environment file instead of deprecated set-output
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Install commitlint and validate commit messages
        run: |
          npx @commitlint/cli commitlint --from=$BASE --to=HEAD --verbose
  install-deps:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress
        run: pnpm exec cypress install

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine effective NX base
        run: |
          BASE="${{ needs.validate.outputs.base }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Using base: $BASE"
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Lint affected projects
        run: pnpm exec nx affected --target=lint --base=$BASE --head=HEAD

  test:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine effective NX base
        run: |
          BASE="${{ needs.validate.outputs.base }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Using base: $BASE"
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Run affected tests
        run: pnpm exec nx affected --target=test --coverage --coverageReporters=lcov --base=$BASE --head=HEAD

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine effective NX base
        run: |
          BASE="${{ needs.validate.outputs.base }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Using base: $BASE"
          echo "BASE=$BASE" >> $GITHUB_ENV

      - name: Build affected projects
        run: pnpm exec nx affected --target=build --configuration=production --base=$BASE --head=HEAD
