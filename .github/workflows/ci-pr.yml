name: CI for Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: '20'
  CACHE_DEPENDENCY_PATH: package-lock.json

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.compute-base.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute NX base ref
        id: compute-base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE=origin/${{ github.event.pull_request.base.ref }}
            if git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE=$BASE" >> $GITHUB_ENV
            else
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          # export via environment file instead of deprecated set-output
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Install commitlint and validate commit messages
        run: |
          npm install --no-save @commitlint/{cli,config-conventional}
          npx commitlint --from=$BASE --to=HEAD --verbose

  install-deps:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.CACHE_DEPENDENCY_PATH }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Cypress
        run: npx cypress install

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint affected projects
        run: npx nx affected --target=lint --base=${{ needs.validate.outputs.base }} --head=HEAD

  test:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run affected tests
        run: npx nx affected --target=test --coverage --coverageReporters=lcov --base=${{ needs.validate.outputs.base }} --head=HEAD

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build affected projects
        run: npx nx affected --target=build --configuration=production --base=${{ needs.validate.outputs.base }} --head=HEAD
