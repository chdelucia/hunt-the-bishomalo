name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:

  validate:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.base.outputs.base }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - name: Compute NX base
        id: base
        run: |
          BASE=origin/${{ github.event.pull_request.base.ref }}
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Validate commits
        run: |
          bun add @commitlint/{cli,config-conventional}
          bun x commitlint --from=${{ steps.base.outputs.base }} --to=HEAD

  install:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Cypress
        run: bun x cypress install

  lint:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t lint --base=${{ needs.validate.outputs.base }} --parallel

  test:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t test --coverage --parallel --base=${{ needs.validate.outputs.base }}

  build:
    runs-on: ubuntu-latest
    needs: [install, validate]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t build --configuration=production --parallel --base=${{ needs.validate.outputs.base }}

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true   # <- No bloquea merge si falla

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile
      - run: bun x nx affected -t e2e --parallel