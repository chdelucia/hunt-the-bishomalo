name: CI for Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: '20'
  CACHE_DEPENDENCY_PATH: bun.lock

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.compute-base.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Compute NX base ref
        id: compute-base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE=origin/${{ github.event.pull_request.base.ref }}
            if git rev-parse --verify "$BASE" >/dev/null 2>&1; then
              echo "BASE=$BASE" >> $GITHUB_ENV
            else
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi
          # export via environment file instead of deprecated set-output
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: Install commitlint and validate commit messages
        run: |
          bun add @commitlint/{cli,config-conventional}
          # Determine commit range for PR: use the PR base if available, otherwise fallback to first commit
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE_REF=origin/${{ github.event.pull_request.base.ref }}
            if git rev-parse --verify "$BASE_REF" >/dev/null 2>&1; then
              FROM_REF=$(git rev-parse "$BASE_REF")
            else
              FROM_REF=$(git rev-list --max-parents=0 HEAD)
            fi
          else
            FROM_REF=$(git rev-list --max-parents=0 HEAD)
          fi
          bun x commitlint --from=$FROM_REF --to=HEAD --verbose

  install-deps:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Cypress
        run: bun x cypress install

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ env.NODE_VERSION }}-${{ hashFiles(env.CACHE_DEPENDENCY_PATH) }}

  lint:
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      NX_BASE: ${{ needs.validate.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ env.NODE_VERSION }}-${{ hashFiles(env.CACHE_DEPENDENCY_PATH) }}

      - name: Lint
        run: bun x nx affected -t lint --parallel

  test:
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      NX_BASE: ${{ needs.validate.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ env.NODE_VERSION }}-${{ hashFiles(env.CACHE_DEPENDENCY_PATH) }}

      - name: Test with coverage
        run: bun x nx affected -t test --coverage --coverageReporters=lcov --parallel

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    env:
      NX_BASE: ${{ needs.validate.outputs.base }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ env.NODE_VERSION }}-${{ hashFiles(env.CACHE_DEPENDENCY_PATH) }}

      - name: Build production
        run: bun x nx affected -t build --configuration=production --parallel
