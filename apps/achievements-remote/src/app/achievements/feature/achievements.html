<div class="achievements-container">
  <div class="achievements-content">
    <div class="header-container">
      <a routerLink="/home" class="back-link">
        <i class="arrow-left-icon"></i>
        <span>{{ 'achievements.backToGame' | transloco }}</span>
      </a>
    </div>

    <div class="progress-section">
      <h2 class="progress-title">
        <span class="emoji">🏆</span> {{ 'achievements.progressTitle' | transloco }}
      </h2>

      <app-achievement-progress
        [unlockedCount]="unlockedCount()"
        [totalCount]="achievements().length"
        [percentage]="percentage()"
      />

      <app-achievement-filter [currentFilter]="filter()" (filterChanged)="setFilter($event)" />
    </div>

    <div class="achievement-list">
      @for (achievement of filteredAchievements(); track achievement.id; let i = $index) {
        <app-achievement-item [achievement]="achievement" [style.--index]="i" />
      }
    </div>

    @if (filteredAchievements().length === 0) {
      <div class="empty-state">
        <p class="empty-message">
          {{ 'achievements.noAchievements' | transloco }}
        </p>
      </div>
    }
  </div>
</div>
